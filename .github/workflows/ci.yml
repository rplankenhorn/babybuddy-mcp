name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: mise run install

      - name: Lint
        run: mise run lint

      - name: Type check
        run: mise run typecheck

      - name: Test
        run: BABYBUDDY_URL=http://localhost:8000 BABYBUDDY_TOKEN=test mise run test
